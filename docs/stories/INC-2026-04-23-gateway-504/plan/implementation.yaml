complexity: STANDARD
estimatedEffort: "13-15h active dev + 24h production observation (~2-3 days)"

# ===================================================================
# ARCHITECTURAL DECISIONS (resolving critique.json CRIT-1 and CRIT-4)
# ===================================================================
architecturalDecisions:
  - id: AD-1
    relatesTo: CRIT-1
    title: "RunPod /status response contains image_b64 INLINE; gateway does NOT fetch /view"
    decision: |
      Gateway runpod.ts exposes only submitJob() → /run and getStatus() → /status.
      No getOutput() function. Image bytes arrive as part of /status response when
      status=COMPLETED via the `output` field.
    rationale: |
      serverless/handler.py:237 returns {"image_b64": <b64>, "metadata": {...}}.
      RunPod Serverless framework marshals this return value into the `output` field
      of /v2/{endpoint}/status/{id} responses. The /view endpoint is internal to the
      RunPod worker (ComfyUI → handler.py) and is not exposed to /v2/ clients.
      Verified via handler.py inspection + research RT-2 /status schema.
    tradeoff_considered: |
      Defensive design (probe for inline first, fall back to /view) was considered
      but rejected — adds complexity without benefit since handler contract is stable
      and controlled by us (CON-3 locks handler.py unchanged).

  - id: AD-2
    relatesTo: CRIT-4
    title: "DEPRECATE ColdStartError. INTRODUCE TimeoutError in SDK v0.2.0"
    decision: |
      sdk/src/errors.ts changes:
        - REMOVE ColdStartError export (deprecated in v0.2.0)
        - ADD TimeoutError (new class extending Error) — thrown when:
            (a) SDK poll loop exhausts max attempts before reaching terminal state, OR
            (b) Gateway returns 504 with error_code='generation_timeout', OR
            (c) Gateway returns GET /jobs/{id} body status='timeout' (mapped from RunPod TIMED_OUT)
        - PRESERVE RateLimitError, AuthError, NetworkError, ValidationError (unchanged)
    rationale: |
      In async architecture, cold-start is NOT an error — it's a polling phase.
      Semantically repurposing ColdStartError to mean "generation timeout" would be
      misleading. Clean taxonomy: "TimeoutError" accurately describes the terminal
      failure mode in the new model. ASM-4 confirms no third-party consumers affected.
    breaking_change_migration: |
      v0.1.0 → v0.2.0 CHANGELOG entry MUST document:
      "⚠️ BREAKING: ColdStartError removed. If you had 'catch (e) { if (e instanceof
      ColdStartError) ... }', replace with 'catch (e) { if (e instanceof TimeoutError)
      ... }'. Cold-start is no longer a terminal error in v0.2.0 — the SDK transparently
      polls the gateway async job endpoint."

