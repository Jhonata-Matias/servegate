qualityGates:
  - id: gate-phase-1-complete
    after: phase-1
    criteria:
      - "JOBS_KV namespace created and bound in wrangler.toml"
      - "types.ts compiles with new types and JobStatus enum"
      - "RunPod env var COMFY_GENERATION_TIMEOUT_S=280 verified"
    blocking_for: phase-2

  - id: gate-phase-2-complete
    after: phase-2
    criteria:
      - "All new files compile (typecheck passes)"
      - "gateway/src/proxy.ts deleted"
      - "npm run build succeeds"
      - "No TypeScript errors across gateway/src/"
    blocking_for: phase-3

  - id: gate-gateway-ready
    after: [phase-2, phase-3]
    criteria:
      - "All gateway tests green (unit + integration)"
      - "NFR-5 observational test passes (≤30 reads/session)"
    blocking_for: phase-5-deploy-preview

  - id: gate-sdk-ready
    after: phase-4
    criteria:
      - "All SDK tests green"
      - "SDK builds cleanly (CJS + ESM)"
      - "package.json version === 0.2.0"
      - "CHANGELOG has ⚠️ BREAKING entry"
    blocking_for: sdk-publish  # separate concern, not in this plan's scope

  - id: gate-preview-smoke-passes
    after: "5.6"
    criteria:
      - "POST /jobs returns 202 with correct headers in <2s"
      - "Full submit+poll cycle returns image_b64 (warm and cold scenarios)"
      - "POST / returns 404 with migration_doc pointer"
    blocking_for: "5.7"

  - id: gate-prod-zero-504
    after: "5.7 + 24h"
    criteria:
      - "Count(status=504 AND wallTimeMs>=60000) == 0 in 24h observation window"
    outcome_on_fail: "Rollback via wrangler; investigate and iterate"
    outcome_on_pass: "Story INC-2026-04-23-gateway-504 marked Done; close incident"

# ===================================================================
# ROLLBACK PLAN
# ===================================================================
rollback:
  scope_per_phase:
    phase-1: "wrangler.toml edit revert; no infra cost of orphan KV namespace (delete via dashboard if desired)"
    phase-2: "git revert commits; proxy.ts restored from history"
    phase-3: "N/A — test files don't affect production"
    phase-4: "sdk version stays 0.1.0 on npm (v0.2.0 not published if tests fail)"
    phase-5-preview: "wrangler rollback (<1min) — targets previous worker version"
    phase-5-prod: |
      Same as preview rollback. Clients hit POST /jobs → 404 briefly during rollback;
      retry after 30s resolves. Consider announcing rollback if delay >5min.
  overall_safety_net: |
    Git-based rollback recoverable at every commit. Production rollback window
    <1 minute (Cloudflare Workers versioning). No data loss risk — KV entries
    naturally TTL-expire; no schema migration involved.

# ===================================================================
# NEXT STEPS (PIPELINE CONTINUATION)
# ===================================================================
nextSteps:
  afterApproval: |
    1. @architect updates status: pending_approval → pending
    2. Hand off to @sm via *draft to create formal story file at:
       docs/stories/INC-2026-04-23-gateway-504/INC-2026-04-23-gateway-504.story.md
       (story-tmpl.yaml) which bundles this implementation.yaml as executable tasks
       for @dev.
    3. Alternative: skip story drafting and hand directly to @dev with this
       implementation.yaml as contract (user's call — depends on whether formal
       story lifecycle or direct dev is preferred for incident-driven work).

  alternativePaths:
    - id: direct_dev
      when: "user wants to move fast; incident is fresh"
      action: "Hand off implementation.yaml directly to @dev"
      trade-off: "Skips @po validation; story governance lighter"
    - id: formal_story
      when: "user wants full AIOX process compliance"
      action: "@sm *draft → @po *validate → @dev *develop"
      trade-off: "More ceremony; better traceability post-facto"

