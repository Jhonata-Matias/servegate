  # ==========================================================================
  - id: F7
    severity: CRITICAL
    category: correctness
    round_discovered: 3
    location: "serverless/handler.py:153-165 + serverless/workflow_template_qwen_edit.json:4-24 + serverless/tests/test_handler_qwen_workflow.py:47-51 + serverless/tests/test_handler_dispatch.py:70-71"
    issue: |
      AC2 graph uses 4 ComfyUI class_type strings that do not exist in any public ComfyUI version (core v0.3.62 pinned or v0.19.3 latest) nor in any public GitHub custom-node repository, nor locally in the repo:
      - QwenImageEditDiffusionModelLoader (node 10)
      - QwenImageEditCLIPLoader (node 11)
      - QwenImageEditVAELoader (node 12)
      - LoadImageBase64 (node 13)

      The Dockerfile (serverless/Dockerfile:20-23) installs only ComfyUI core at v0.3.62 with no custom_nodes/ population. A live ComfyUI worker will reject the workflow with NODE_CLASS_MAPPINGS lookup error at /prompt submission.

      The 34/34 pytest green figure from Round 2 is misleading for AC2 — the tests that "validate" the Qwen workflow are TAUTOLOGICAL: they assert the handler returns the same strings the story asked it to emit, without cross-checking those strings against a real ComfyUI registry or /object_info endpoint.
    evidence:
      - "Raw fetch https://raw.githubusercontent.com/comfyanonymous/ComfyUI/v0.19.3/nodes.py — none of the 4 class names present"
      - "Raw fetch comfy_extras/nodes_qwen.py (latest) — provides only TextEncodeQwenImageEdit, TextEncodeQwenImageEditPlus, EmptyQwenImageLayeredLatentImage (none of which the handler uses)"
      - "GitHub Code Search API (authenticated, 2026-04-24): total_count=0 for each of the 4 invented names"
      - "Repository scan: find . -type d -name custom_nodes → empty; grep -l invented names → only handler.py + 2 test files + workflow_template JSON"
      - "serverless/Dockerfile installs ComfyUI core only; no custom-node package install"
    why_rounds_1_2_missed:
      - "Round 1 + Round 2 evidence for AC2 validated that the handler EMITS the names documented in ADR-0003, which is factually true but not the same as validating those names resolve against a real ComfyUI registry"
      - "Unit tests are tautological: handler returns 'X' → test asserts handler returned 'X'. No registry introspection; no live workflow submission; no CI stage requiring a running ComfyUI"
      - "'Performance' NFR was marked DEFERRED (cannot measure without deploy) — but correctness was treated as validated via pattern match, which was a meta-review gap"
    recommendation: |
      Return to @dev. Three remediation options (detailed in .aiox/notes/story-3.1-deploy-halt-2026-04-24.md):

      Option A (recommended): Replace invented class_types with real core ComfyUI nodes:
        - Node 10: UNETLoader (unet_name, weight_dtype='fp8_e4m3fn')
        - Node 11: CLIPLoader (clip_name, type='qwen_image') — requires ComfyUI version that supports this type (bump COMFY_REF from v0.3.62 needed)
        - Node 12: VAELoader (vae_name)
        - Node 13: handler decodes base64 → /tmp/{uuid}.png; use LoadImage (image=filename); cleanup tmp post-request
