# === Recommended actions ===
recommendations:
  for_dev:
    - |
      [REQUIRED for AC8 closure] Add Aside surface token overrides to web/docs/src/styles/theme.css
      so the dark theme is applied consistently regardless of the html data-theme attribute.
      Suggested patch (append to theme.css):

      ```css
      /* AC8 fix — force dark-mode Aside surfaces in BOTH theme contexts (V1 is dark-only).
         Without this, Starlight's light-theme --sl-color-{blue,purple,orange,red}-low
         tokens leak into Aside backgrounds when Chrome renders without explicit
         data-theme='dark' (e.g., headless), producing AA contrast violations against
         the forced-white Aside body text. Refs: docs/qa/gates/2.9-docs-portal-refactor.yml AC8 */
      :root,
      :root[data-theme='light'],
      :root[data-theme='dark'] {
        --sl-color-blue-low:    hsl(234, 54%, 20%);
        --sl-color-blue-high:   hsl(234, 100%, 87%);
        --sl-color-purple-low:  hsl(281, 54%, 20%);
        --sl-color-purple-high: hsl(281, 100%, 87%);
        --sl-color-orange-low:  hsl(41, 39%, 22%);
        --sl-color-orange-high: hsl(41, 82%, 87%);
        --sl-color-red-low:     hsl(339, 39%, 22%);
        --sl-color-red-high:    hsl(339, 82%, 87%);
      }
      ```

      After applying, re-run `pnpm preview` + Lighthouse on quickstart/api/sdk/errors to
