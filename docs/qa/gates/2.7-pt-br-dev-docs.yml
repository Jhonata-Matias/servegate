    description: |
      Uses anglicism 'copyright' where Brazilian law (Lei 9.610/98) uses
      'direitos autorais'. In dev audience context it is defensible;
      in enterprise BR context 'direitos autorais' would be more robust.
    recommendation: "Optional follow-up if legal review requested. Bilingual equivalence clause (AC4) mitigates jurisdictional ambiguity."
