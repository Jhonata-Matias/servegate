    severity: LOW_MEDIUM
    category: privacy_ux
    title: "Issue template lacks public visibility warning"
    location: ".github/ISSUE_TEMPLATE/access-request.yml"
    description: |
      Template collects name + GitHub username + use_case (free-text)
      with placeholder "Jane Doe — Acme Corp" implying real name.
      GitHub issues are public by default and indexed permanently.
      No warning surfaces this to submitters.
    impact: |
      Privacy-conscious submitters might inadvertently disclose more
      than intended. No automatic data exfiltration — submitter chooses
      what to write — but default UX nudges over-disclosure.
    recommendation: |
      Prepend a markdown block at top of access-request.yml:
      "⚠️ This issue will be public. Use only your GitHub handle if you
      prefer privacy, or contact via GitHub DM instead."
    blocking: false
    suggested_owner: "@dev or follow-up issue"
    estimated_fix: "2 minutes"

