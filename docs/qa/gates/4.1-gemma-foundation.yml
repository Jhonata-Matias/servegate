# ============================================================================
# FOUNDATION_SET (GMS_FND_001) — 5 blocking criteria from wf-gated-model-serve
# ============================================================================
foundation_set_criteria:
  - id: FS1
    name: "ADR approved (model + provider + gateway all named)"
    status: PASS
    evidence:
      - "docs/architecture/adr-0004-gemma-text-gen-stack.md §Decision names:"
      - "  - alpha model: google/gemma-3-4b-it"
      - "  - premium tier: google/gemma-3-27b-it (pre-approved)"
      - "  - runtime: runpod-workers/worker-vllm:v2.14.0"
      - "  - GPU: L4 24GB (alpha) / A100 80GB (premium)"
      - "  - weight storage: RunPod network volume"
      - "  - endpoint topology: new dedicated text-gen endpoint"
      - "  - gateway: reuse existing Cloudflare Worker at gateway/"
      - "  - response mode: SSE streaming + non-streaming JSON fallback"
      - "  - rate-limit: 50,000 tokens/day global, post-flight accounting"
    score: 10

  - id: FS2
    name: "Cost model shows alpha phase < <alpha cost ceiling> at target volume"
    status: PASS
    evidence:
      - "docs/architecture/cost-model-text-gen.md §2 projects alpha cost under 3 scenarios:"
      - "  - Scenario A (warm-only): <warm-only projection> at 100 calls/day"
      - "  - Scenario B (10% cold, realistic): <realistic alpha projection>"
      - "  - Scenario C (25% cold, pessimistic): <pessimistic alpha projection>"
      - "  + storage <incremental cost> (50GB network volume)"
      - "Worst-case alpha projection: <worst-case alpha projection> (69% headroom under <alpha cost ceiling>)"
      - "Scales to ~$46/mo at 500 calls/day — stays under ceiling at 5x alpha traffic"
    score: 10

  - id: FS3
    name: "Cold-start p95 fits within cold_start_budget_seconds (180s default)"
    status: PASS
    evidence:
      - "docs/architecture/gemma-provider-assessment.md §3 Cold-start Budget Analysis:"
      - "  - p50 target: ≤30s (FlashBoot revive path)"
      - "  - p99 target: ≤180s (fresh worker, network-volume weight load)"
      - "  - Estimated p95 for Gemma 3 4B bf16 (~8GB weights) on L4: 60-90s"
      - "  - FlashBoot reduces subsequent boots to 3-15s"
      - "  - Mitigation plan if p99 breaches: pre-warm via cron (~$11/mo for 1 always-on L4) OR bake weights into Docker"
      - "  - Measurement: cold_start_ms log line + X-Runpod-Worker-Id header tracking"
    score: 9
    notes: "9/10 because p95 is estimated, not measured. Story 4.2 AC must include empirical p95 measurement; if it exceeds 180s, mitigation triggers automatically per ADR-0004 Pivot Criterion #2."

  - id: FS4
    name: "Provider secret model is compatible with gateway platform"
    status: PASS
    evidence:
      - "docs/architecture/gemma-provider-assessment.md §4 HF_TOKEN Lifecycle:"
      - "  - Stored: RunPod endpoint env var OR RunPod Secret API (both encrypted at rest)"
      - "  - Access-minimized: token lives only in RunPod worker process, never touches Cloudflare Worker"
      - "  - Rotation: 90-day SOP documented"
      - "  - Audit: RunPod endpoint env-var changes logged in audit trail"
      - "  - Non-negotiable: HF_TOKEN MUST NOT appear in RunPod request/response logs (worker-vllm verified non-logging)"
      - "gemma-gateway-decision.md §6 confirms auth scheme reuse (Authorization: Bearer / X-API-Key) unchanged"
    score: 10

  - id: FS5
    name: "Licensing allows commercial API exposure"
    status: PASS
    evidence:
      - "docs/architecture/gemma-model-candidates.md §4 Gemma Terms of Use Audit:"
      - "  - Commercial use: PERMITTED (no revenue cap, no MAU cap)"
      - "  - Prohibited Use Policy URL documented: https://ai.google.dev/gemma/prohibited_use_policy"
      - "  - Attribution: NOT required for hosted services (only for Distributions)"
      - "  - Derivative works: PERMITTED (fine-tuning, distillation, transfer learning)"
      - "  - Weight redistribution: PERMITTED with Section 3.2 restrictions (N/A — we only serve inference)"
      - "Enforcement strategy: Prohibited Use categories copied into TERMS.md draft stub (Story 4.4)"
      - "HF EULA: maintainer accepts EULA on google/gemma-3-4b-it before HF_TOKEN minting (Story 4.1 runbook)"
    score: 10

