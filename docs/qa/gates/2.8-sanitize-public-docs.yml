    context: "# Cole RUNPOD_ENDPOINT_ID (output do deploy Story 2.1, e.g. 80e45g6gct1opm)"
    impact: |
      Story 2.8 goal is to close business intelligence exposure in the
      public repo HEAD. This leak undermines that goal partially.
      Pre-existing (was in planning/main before Story 2.8; L2 emergency
      removal didn't touch consumer-facing docs).
    scope_ambiguity: |
      PRD v1.0 Out-of-Scope lists "Sanitization de consumer-facing docs
      → tech debt follow-up". However, pragmatically, shipping a known
      leak is contrary to Story 2.8's intent.
    recommendation: |
      Surgical fix in-PR:
      sed -i 's/80e45g6gct1opm/<RUNPOD_ENDPOINT_ID>/' docs/usage/gateway-deploy.md
      Verification: grep 80e45g6gct1opm docs/usage/gateway-deploy.md == empty
    blocking: false  # Upgradeable in-PR per Story 2.6 F1 precedent
    suggested_owner: "@dev"
    estimated_fix: "2 minutes"

  - id: F2
    severity: MEDIUM
    category: sanitization_completeness
    title: "pt-BR currency variant /mês missed by sed rules (14 occurrences)"
    location: "Multiple files — see table below"
    affected_files:
      - "docs/stories/2.1.2.decide-cold-start-mitigation.story.md (1 match)"
      - "docs/stories/2.1.runpod-serverless-flux-endpoint.story.md (3 matches)"
      - "docs/stories/2.5.gateway-rate-limit-cloudflare.story.md (1 match)"
      - "docs/architecture/adr-0001-flux-cold-start.md (3 matches)"
      - "docs/qa/1.1-closure-summary.md (2 matches)"
      - "docs/prd/epic-2-consumer-integration.md non-methodology section (4 matches in Cost Projection area)"
    description: |
      Security audit Section 7 Rule 2 examples used '/mo' (English)
      suffix: '$25/mo → <$50/mo alpha budget'. @dev sed script replicated
      these patterns literally. pt-BR source docs use '/mês' suffix for
      monthly costs, which was not covered.
    examples:
      - "<standby cost> 24/7 idle (Story 2.1.2)"
      - "<standby cost>, <alternative stack 1-2 orders higher>, ~<cost threshold> (Story 2.1)"
      - "<alternative stack 1-2 orders higher>, <alternative stack 1-2 orders higher>, <alternative stack mid-range> (ADR-0001)"
      - "<storage overhead>, <storage overhead> (1.1-closure)"
      - "<within budget>, <within budget>, <within budget>, <worst case sustained> (Epic 2 PRD Cost Projection)"
    recommendation: |
      Extend sed rules with pt-BR variants:
      s/\$[0-9]+\.[0-9]+\/mês/<cost per month>/g
      s/\$[0-9]+\/mês/<cost per month>/g
      Re-apply sed to 6 affected files. Re-run grep suite — expect zero
      /mês matches post-fix.
    blocking: false  # Upgradeable in-PR
    suggested_owner: "@dev"
    estimated_fix: "10-15 minutes (extend script + re-run + re-verify)"

