# Cloudflare Worker config — servegate FLUX gateway (Story 2.5, formerly gemma4)
# Worker name below stays "gemma4-gateway" intentionally — renaming would break the public URL
# gemma4-gateway.jhonata-matias.workers.dev that SDK v0.1.0-alpha clients depend on.
# After `wrangler kv namespace create RATE_LIMIT_KV`, replace KV_NAMESPACE_ID_PLACEHOLDER below
# with the real ID returned by Wrangler.
#
# Secrets configured via `wrangler secret put`:
# - GATEWAY_API_KEY — generated random (openssl rand -hex 32)
# - RUNPOD_API_KEY  — same as serverless/.env (Story 2.1)
# - RUNPOD_ENDPOINT_ID — endpoint ID from Story 2.1 deploy
# - RUNPOD_TEXT_ENDPOINT_ID — text endpoint ID from Story 4.2 deploy

name = "gemma4-gateway"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Free tier: 100k requests/day, 10ms CPU per request — way over our 100/day budget
workers_dev = true

[vars]
# Self-CORS for production worker — landing/dogfood. Story 4.4 alpha launch may
# revisit if a public landing domain (gemma4.dev or other) is provisioned.
CORS_ALLOWED_ORIGIN = "https://gemma4-gateway.jhonata-matias.workers.dev"
RUNPOD_LTX_ENDPOINT_ID = "j8oub0cfiz5oke"
# Story 5.2 Task 6 — video daily quota (configurable; default 20 calls/day per API key)
VIDEO_DAILY_LIMIT = "20"

# KV namespace for rate-limit counter (key: count:YYYY-MM-DD, TTL 48h)
# Created via `npm run kv:create` 2026-04-21
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "55bd0b4a7c3c44bb958331ba82035e55"

# KV namespace for async job mapping (key: <job_id_uuid>, value: JobMapping, TTL
# completion+30min OR submit+6h). Added 2026-04-23 for INC-2026-04-23-gateway-504
# async submit/poll refactor (FR-3).
# Namespace criado em 2026-04-23 (`wrangler kv namespace create JOBS_KV`).
[[kv_namespaces]]
binding = "JOBS_KV"
id = "b3799bff71cc4d9c8e28bcf27d963eab"

# KV namespace for video daily quota (key: videos:YYYY-MM-DD:{api_key_hash}, value: int counter).
# Story 5.2 Task 3 will read/write here for video rate-limit (separate from RATE_LIMIT_KV which
# tracks image jobs). Created 2026-05-04 (`wrangler kv namespace create VIDEOS_KV`).
[[kv_namespaces]]
binding = "VIDEOS_KV"
id = "94ea78881fac4459b2fabba31d62a09f"
preview_id = "87a93a652af0430895ca2edca16f4cde"

# R2 bucket for generated MP4 video output (pre-signed URLs, 24h TTL, Story 5.2 Task 2).
# Bucket created 2026-05-04 (`wrangler r2 bucket create servegate-videos`).
[[r2_buckets]]
binding = "R2_VIDEOS_BUCKET"
bucket_name = "servegate-videos"

# Preview worker (Phase 5.6 INC-2026-04-23-gateway-504). KV bindings must be repeated
# per env (not inherited). Secrets are per-script: `wrangler secret put <NAME> --env preview`.
[env.preview]
name = "gemma4-gateway-preview"
workers_dev = true

[env.preview.vars]
CORS_ALLOWED_ORIGIN = "https://gemma4.dev"
RUNPOD_LTX_ENDPOINT_ID = "j8oub0cfiz5oke"
VIDEO_DAILY_LIMIT = "20"

[[env.preview.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "55bd0b4a7c3c44bb958331ba82035e55"

[[env.preview.kv_namespaces]]
binding = "JOBS_KV"
id = "b3799bff71cc4d9c8e28bcf27d963eab"

[[env.preview.kv_namespaces]]
binding = "VIDEOS_KV"
id = "94ea78881fac4459b2fabba31d62a09f"
preview_id = "87a93a652af0430895ca2edca16f4cde"

[[env.preview.r2_buckets]]
binding = "R2_VIDEOS_BUCKET"
bucket_name = "servegate-videos"

# Observability — logs visible in `wrangler tail` and Cloudflare dashboard
[observability]
enabled = true

# Optional: limit to specific routes (uncomment when custom domain configured)
# [[routes]]
# pattern = "gateway.gemma4.dev/*"
# custom_domain = true
