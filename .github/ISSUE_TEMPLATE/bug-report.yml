name: Bug Report
description: Report a bug in the gateway, SDK, docs, or example code.
title: "[Bug] <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include enough detail to reproduce the issue.
        For **security vulnerabilities**, please use [private vulnerability reporting](../security/advisories/new) instead.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Node.js version (run `node --version`).
      placeholder: e.g., macOS 14.3, Node v20.11.0
    validations:
      required: true

  - type: input
    id: sdk_version
    attributes:
      label: SDK version (if applicable)
      description: From `package.json` or `npm list @jhonata-matias/flux-client`.
      placeholder: e.g., 0.1.0
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Minimal, numbered steps to reproduce.
      placeholder: |
        1. Install SDK with `npm install @jhonata-matias/flux-client`
        2. Call `client.generate({ prompt: "..." })`
        3. Observe error...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: The call should return an image within ~10s (warm) or ~130s (cold).
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: Received a 502 error after 30s...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant error messages or stack traces. **Redact your API key.**
      render: text
    validations:
      required: false
