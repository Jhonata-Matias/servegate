name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature] <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! During alpha, we prioritize features that:
        1. Unblock alpha users (distribution, onboarding, observability).
        2. Reduce cost or latency tail.
        3. Expand model coverage without increasing maintenance burden.

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem does this solve? Who experiences it?
      placeholder: |
        As a [type of user], when I [action], I [current friction / limitation].
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: How would you solve it? Rough sketch is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed; why this one is better.
    validations:
      required: false

  - type: dropdown
    id: volume_impact
    attributes:
      label: Your expected usage of this feature
      options:
        - "Nice-to-have (would use occasionally)"
        - "Important (would use regularly)"
        - "Critical (can't adopt gemma4 without it)"
    validations:
      required: true
